<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Page Not Found - Live Projects" />
    <meta name="theme-color" content="#04050a" />
    <title>404 — Page Not Found | Live Projects</title>

    <!-- Outfit Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Bootstrap Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link rel="icon" type="icon" href="icon.ico" sizes="any" />

    <style>
      /* ── Variables ── */
      :root {
        color-scheme: dark;
        font-family: "Outfit", "Segoe UI", sans-serif;
        --bg-primary: #02040a;
        --bg-secondary: #0a0b18;
        --text-primary: #ffffff;
        --text-muted: #8b92b6;
        --accent: #5e35b1;
        --accent-strong: #00e5ff;
      }

      /* ── Reset ── */
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html {
        scroll-behavior: smooth;
        scrollbar-width: none;
        -ms-overflow-style: none;
      }

      body {
        min-height: 100vh;
        background-color: var(--bg-primary);
        background-image:
          radial-gradient(
            circle at 15% 15%,
            rgba(94, 53, 177, 0.15) 0%,
            transparent 40%
          ),
          radial-gradient(
            circle at 85% 85%,
            rgba(0, 229, 255, 0.1) 0%,
            transparent 40%
          ),
          linear-gradient(
            180deg,
            rgba(2, 4, 10, 0) 0%,
            rgba(10, 11, 24, 0.8) 100%
          );
        color: var(--text-primary);
        font-size: 16px;
        line-height: 1.6;
        overflow-x: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      /* ── Backdrop Orbs ── */
      .backdrop {
        position: fixed;
        inset: 0;
        overflow: hidden;
        z-index: 0;
        pointer-events: none;
      }

      .gradient-orb {
        position: absolute;
        border-radius: 50%;
        filter: blur(80px);
        opacity: 0.6;
        animation: drift 20s ease-in-out infinite alternate;
      }

      .orb-one {
        width: 450px;
        height: 450px;
        top: -150px;
        left: -150px;
        background: radial-gradient(
          circle,
          rgba(94, 53, 177, 0.8),
          transparent 70%
        );
      }

      .orb-two {
        width: 500px;
        height: 500px;
        bottom: -200px;
        right: -150px;
        background: radial-gradient(
          circle,
          rgba(0, 229, 255, 0.5),
          transparent 70%
        );
        animation-delay: -5s;
      }

      .particle-field {
        position: absolute;
        inset: 0;
        overflow: hidden;
      }

      .particle {
        position: absolute;
        width: var(--size, 4px);
        height: var(--size, 4px);
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.4);
        filter: drop-shadow(0 0 4px rgba(255, 255, 255, 0.8));
        top: var(--top, 0%);
        left: var(--left, 0%);
        animation: particleFloat var(--duration, 15s) linear infinite;
        animation-delay: var(--delay, 0s);
      }

      /* ── Main Content ── */
      .container {
        position: relative;
        z-index: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        padding: clamp(3rem, 8vw, 6rem) 1.5rem;
        animation: fadeUp 1s cubic-bezier(0.2, 0.8, 0.2, 1) both;
        max-width: 680px;
        width: 100%;
      }

      /* ── Glowing 404 Number ── */
      .error-code {
        font-size: clamp(6rem, 20vw, 10rem);
        font-weight: 800;
        line-height: 1;
        letter-spacing: -0.04em;
        background: linear-gradient(
          120deg,
          var(--accent-strong),
          #a27aff,
          var(--accent-strong)
        );
        background-size: 200% auto;
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        animation: shimmer 4s linear infinite;
        filter: drop-shadow(0 0 40px rgba(0, 229, 255, 0.4));
        margin-bottom: 0.5rem;
      }

      /* ── Badge ── */
      .badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0.6rem 2rem;
        border-radius: 999px;
        font-size: 0.8rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.2em;
        color: #fff;
        background: rgba(10, 11, 24, 0.6);
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow:
          inset 0 0 20px rgba(0, 229, 255, 0.2),
          0 15px 35px rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(10px);
        position: relative;
        overflow: hidden;
        margin-bottom: 2rem;
      }

      .badge::before {
        content: "";
        position: absolute;
        inset: -50%;
        background: conic-gradient(
          from 0deg,
          rgba(94, 53, 177, 0.5),
          rgba(0, 229, 255, 0.8),
          transparent 60%
        );
        animation: badgeSpin 4s linear infinite;
        z-index: -1;
      }

      .badge::after {
        content: "";
        position: absolute;
        inset: 2px;
        background: var(--bg-secondary);
        border-radius: inherit;
        z-index: -1;
      }

      .badge span {
        background: linear-gradient(135deg, #fff, #00e5ff);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }

      /* ── Text ── */
      .title {
        font-size: clamp(1.8rem, 5vw, 2.8rem);
        font-weight: 800;
        letter-spacing: -0.02em;
        margin-bottom: 1rem;
        text-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      }

      .title .highlight {
        background: linear-gradient(120deg, var(--accent-strong), #a27aff);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }

      .subtitle {
        font-size: clamp(1rem, 2vw, 1.15rem);
        color: var(--text-muted);
        max-width: 480px;
        line-height: 1.7;
        font-weight: 400;
        margin-bottom: 2.8rem;
      }

      /* ── Glassmorphism Card ── */
      .glass-card {
        background: linear-gradient(
          145deg,
          rgba(20, 22, 40, 0.7),
          rgba(10, 11, 20, 0.85)
        );
        border: 1px solid rgba(255, 255, 255, 0.07);
        border-radius: 28px;
        padding: 2.2rem 2.8rem;
        backdrop-filter: blur(20px);
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
        margin-bottom: 2.5rem;
        display: flex;
        align-items: center;
        gap: 1.2rem;
        transition:
          border-color 0.4s ease,
          box-shadow 0.4s ease;
      }

      .glass-card:hover {
        border-color: rgba(0, 229, 255, 0.3);
        box-shadow:
          0 25px 60px rgba(0, 0, 0, 0.5),
          0 0 30px rgba(0, 229, 255, 0.15);
      }

      .glass-card i {
        font-size: 2.5rem;
        background: linear-gradient(135deg, var(--accent-strong), #a27aff);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        flex-shrink: 0;
      }

      .glass-card p {
        font-size: 0.95rem;
        color: var(--text-muted);
        text-align: left;
        line-height: 1.6;
      }

      /* ── Buttons ── */
      .btn-group {
        display: flex;
        gap: 1rem;
        flex-wrap: wrap;
        justify-content: center;
      }

      .btn-primary {
        display: inline-flex;
        align-items: center;
        gap: 0.6rem;
        padding: 0.85rem 2.2rem;
        border-radius: 999px;
        text-decoration: none;
        font-size: 0.95rem;
        font-weight: 700;
        color: #02040a;
        background: linear-gradient(135deg, var(--accent-strong), #ffffff);
        box-shadow:
          0 10px 25px rgba(0, 229, 255, 0.4),
          inset 0 2px 0 rgba(255, 255, 255, 0.5);
        border: none;
        transition: all 0.3s ease;
        cursor: pointer;
      }

      .btn-primary:hover {
        background: linear-gradient(135deg, #ffffff, var(--accent-strong));
        box-shadow:
          0 15px 35px rgba(0, 229, 255, 0.6),
          inset 0 2px 0 rgba(255, 255, 255, 0.5);
        transform: translateY(-2px);
      }

      .btn-secondary {
        display: inline-flex;
        align-items: center;
        gap: 0.6rem;
        padding: 0.85rem 2.2rem;
        border-radius: 999px;
        text-decoration: none;
        font-size: 0.95rem;
        font-weight: 600;
        color: #fff;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.12);
        transition: all 0.3s ease;
        cursor: pointer;
      }

      .btn-secondary:hover {
        background: rgba(255, 255, 255, 0.1);
        border-color: var(--accent-strong);
        transform: translateY(-2px);
        box-shadow: 0 10px 25px rgba(0, 229, 255, 0.2);
      }

      /* ── Footer ── */
      .footer {
        position: fixed;
        bottom: 1.5rem;
        color: rgba(255, 255, 255, 0.3);
        font-size: 0.9rem;
        font-weight: 300;
        z-index: 1;
      }

      /* ── Keyframes ── */
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(40px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes drift {
        from {
          transform: translate(-30px, -20px) scale(1);
        }
        to {
          transform: translate(30px, 20px) scale(1.1);
        }
      }

      @keyframes badgeSpin {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }

      @keyframes shimmer {
        0% {
          background-position: 0% center;
        }
        100% {
          background-position: 200% center;
        }
      }

      @keyframes particleFloat {
        0% {
          transform: translate(0, 0) scale(0.8);
          opacity: 0;
        }
        10% {
          opacity: 1;
        }
        90% {
          opacity: 1;
        }
        100% {
          transform: translate(var(--dx, 20px), var(--dy, -80px)) scale(1.2);
          opacity: 0;
        }
      }

      /* ── Responsive ── */
      @media (max-width: 500px) {
        .glass-card {
          flex-direction: column;
          text-align: center;
        }
        .glass-card p {
          text-align: center;
        }
        .btn-group {
          flex-direction: column;
          width: 100%;
        }
        .btn-primary,
        .btn-secondary {
          width: 100%;
          justify-content: center;
        }
      }
    </style>
  </head>
  <body>
    <!-- Animated Background -->
    <div class="backdrop" aria-hidden="true">
      <div class="gradient-orb orb-one"></div>
      <div class="gradient-orb orb-two"></div>
      <div class="particle-field" id="particleField"></div>
    </div>

    <!-- Main Content -->
    <main class="container" role="main">
      <div class="badge"><span>⚠️ Error</span></div>

      <div class="error-code" aria-label="Error 404">404</div>

      <h1 class="title">Page <span class="highlight">Not Found</span></h1>

      <p class="subtitle">
        Looks like this link is broken, or the page may have been moved or
        deleted.
      </p>

      <div class="glass-card" role="note">
        <i class="bi bi-compass" aria-hidden="true"></i>
        <p>
          You might want to head back to the homepage and explore our live
          projects from there.
        </p>
      </div>

      <div class="btn-group">
        <a href="https://livepro.site" class="btn-primary" id="homeBtn">
          <i class="bi bi-house-fill" aria-hidden="true"></i>
          Go Home
        </a>
        <button class="btn-secondary" id="backBtn" onclick="history.back()">
          <i class="bi bi-arrow-left" aria-hidden="true"></i>
          Go Back
        </button>
      </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
      <p>&copy; 2026 Live Projects. All rights reserved.</p>
    </footer>

    <script>
      // Generate floating particles
      const field = document.getElementById("particleField");
      const count = 28;

      for (let i = 0; i < count; i++) {
        const p = document.createElement("div");
        p.className = "particle";

        const size = Math.random() * 4 + 2;
        p.style.setProperty("--size", `${size}px`);
        p.style.setProperty("--top", `${Math.random() * 100}%`);
        p.style.setProperty("--left", `${Math.random() * 100}%`);
        p.style.setProperty("--duration", `${Math.random() * 12 + 10}s`);
        p.style.setProperty("--delay", `${Math.random() * -20}s`);
        p.style.setProperty("--dx", `${(Math.random() - 0.5) * 60}px`);
        p.style.setProperty("--dy", `${-(Math.random() * 80 + 40)}px`);

        field.appendChild(p);
      }
    </script>
  </body>
</html>
